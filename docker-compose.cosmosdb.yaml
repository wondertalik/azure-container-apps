services:
  cosmosdb:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-EN20251223
    environment:
      - AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE=false
      - AZURE_COSMOS_EMULATOR_PARTITION_COUNT=3
    ports:
      - "8081:8081"
      - "1234:1234"
    healthcheck:
      test: curl --insecure --fail https://localhost:8081/_explorer/emulator.pem || exit 1
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 30s
    networks:
      - azure_container_apps_net

  users-init-container:
    image: ${USERS_INIT_CONTAINER_IMAGE:-users-init-container:latest}
    depends_on:
      cosmosdb:
        condition: service_healthy
    environment:
      - DOTNET_ENVIRONMENT=Development
      - Users__UsersInfrastructureCosmosDbOptions__DatabaseId=${USERS_COSMOSDB_DATABASE:-users-db}
      - Users__UsersInfrastructureCosmosDbOptions__ConnectionString=${USERS_COSMOSDB_CONNECTION_STRING:-AccountEndpoint=https://cosmosdb:8081/;AccountKey=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMzsN1lYbyBfCB/Q==}
      - Users__UsersInfrastructureCosmosDbOptions__Throughput=${USERS_COSMOSDB_THROUGHPUT:-400}
      - Users__UsersInfrastructureCosmosDbOptions__UseIntegratedCache=${USERS_COSMOSDB_USE_INTEGRATED_CACHE:-false}
      - Users__UsersInfrastructureCosmosDbOptions__IgnoreSslCertificateValidation=true
      - UsersDropDatabaseIfExists=${USERS_DROP_DATABASE_IF_EXISTS:-false}
      - SeederOptions__TenantsSeed=true
      - SeederOptions__UsersSeed=true
      - SeederOptions__SeedDataFilePath=/app/seed-data
      - OTEL_SERVICE_NAME=UsersInitContainer
      - OTELCOL_URL=${OTELCOL_URL:-}
    volumes:
      - ${SEED_DATA_PATH:-./src/Users.InitContainer.Data/SeedData}:/app/seed-data:ro
    networks:
      - azure_container_apps_net

networks:
  azure_container_apps_net:
    external: true
